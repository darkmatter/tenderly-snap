# Serves the static Gatsby build for the Tenderly snap dApp.
#
# Listens on :8000 (the containerPort the k8s Deployment and cloudflared
# ingress expect) and overwrites nginx-unprivileged's default :8080 server.
# Runs as uid 101 with a read-only root filesystem in the cluster; nginx's
# writable paths (/tmp, /var/cache/nginx) are emptyDir mounts — see
# darkmatter/gitops manifests/tenderly-snap/deployment.yaml.
server {
    listen       8000;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Don't leak the nginx version.
    server_tokens off;

    # Fingerprinted assets are immutable — cache them hard.
    location ~* \.(?:js|css|woff2?|png|jpe?g|gif|svg|ico|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA-style fallback: unmatched routes return the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
